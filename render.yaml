services:
  - type: web
    name: online-test-system-backend
    env: php
    rootDir: backend
    buildCommand: composer install --no-dev --optimize-autoloader && php artisan config:cache && php artisan route:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false